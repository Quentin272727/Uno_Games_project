<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO — Partie</title>
    <link rel="stylesheet" href="/css/jeux.css">
</head>
<body class="page-jeu">
    <header class="game-topbar">
        <button type="button" id="btn-abandon-fixed" class="btn-abandon-fixed">Abandonner</button>
        <button type="button" id="btn-contre-uno-fixed" class="btn-contre-fixed" title="Actif seulement quand un joueur n'a plus qu'une carte">Contre UNO</button>
    </header>
    <div id="hud" class="hud" aria-live="polite"></div>
    <div class="table-wrapper">
        <div id="seat-north" class="seat seat-north" aria-label="Adversaire nord"></div>
        <div class="table-middle-row">
            <div id="seat-west" class="seat seat-west" aria-label="Adversaire ouest"></div>
            <div class="play-zone">
                <div id="middle" class="middle"></div>
                <div id="colorpick" class="colorpick"></div>
            </div>
            <div id="seat-east" class="seat seat-east" aria-label="Adversaire est"></div>
        </div>
    </div>
    <div id="player1" class="player-hand"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/html/gamesript.js"></script>
</body>
</html>
