<body>

  <h1>Lobby</h1>

  <!-- Zone affichage id -->
  <div style="margin-bottom: 20px;">
    <strong>Ton ID :</strong> <span id="my-id"></span>
  </div>

  <!-- barre pour rentrer l'id d'un ami  -->
  <div style="margin-bottom: 20px;">
    <link rel="stylesheet" href="/css/styles_lob.css">
    <input id="friend-id" placeholder="ID de ton ami">
    <button onclick="joinFriendLobby()">Rejoindre</button>
  </div>

  <div id="lobby"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // génération & récup de l'id
  function generateId() {
    return Math.random().toString(36).substring(2, 8).toUpperCase();
  }

  let myId = localStorage.getItem("playerId");
  if (!myId) {
    myId = generateId();
    localStorage.setItem("playerId", myId);
  }

  document.getElementById("my-id").textContent = myId;

 
  const params = new URLSearchParams(window.location.search);
  const nb = parseInt(params.get("joueurs"), 10) || 2;

  const lobby = document.getElementById("lobby");
  lobby.classList.add("lobby-" + nb);

  for (let i = 1; i <= nb; i++) {
    const div = document.createElement("div");
    div.className = "joueur";
    div.dataset.index = i;
    div.innerHTML = `
      <strong>Joueur ${i}</strong><br>
      En attente...
    `;
    lobby.appendChild(div);
  }

  // ajouter socket.io (définir)
  const socket = io();

  let currentLobbyId = null;

  // Fonction pour rejoindre un lobby privé
  function joinFriendLobby() {
    const friendId = document.getElementById("friend-id").value.trim();
    if (!friendId) return alert("Entre l'ID de ton ami");

    // Création d'un lobby unique basé sur les deux IDs
    currentLobbyId = [myId, friendId].sort().join("-");

    socket.emit("join-lobby", { lobbyId: currentLobbyId });
  }

  // Mise à jour du lobby
  socket.on("lobby-state", ({ playersCount }) => {
    const joueurs = document.querySelectorAll(".joueur");
    console.log("État lobby reçu :", playersCount);

    joueurs.forEach((div, index) => {
      if (index < playersCount) {
        div.innerHTML = `<strong>Joueur ${index + 1}</strong><br>Connecté`;
      } else {
        div.innerHTML = `<strong>Joueur ${index + 1}</strong><br>En attente...`;
      }
    });
  });
</script>

</body>
</html>
