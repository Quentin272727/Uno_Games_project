<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/styles.css" rel="stylesheet">
    <link href="../css/navbar.css" rel="stylesheet">
    <link href="../css/main.css" rel="stylesheet">
    <title>UNO</title>
</head>
<body>
    <main class="main">
        <ul>
            <li><a href="/main" class="active">UNO</a></li>
            <li style="float:right"><a href="/connection">S'inscrire / se connecter</a></li>
        </ul>
        <div class="banner"></div>
        <h1>Choisir le nombre de joueurs</h1>

        <select id="nbJoueurs">
            <option value="1">1 joueur</option>
            <option value="2">2 joueurs</option>
            <option value="3">3 joueurs</option>
            <option value="4">4 joueurs</option>
        </select>

        <br><br>

        <button onclick="valider()">Valider</button>

        <br><br>

        <p>Ton ID : <span id="my-id"></span></p>

        <script>
            function valider() {
            const nb = document.getElementById("nbJoueurs").value;
            if (nb == 1) {
                window.location.href = "jeux";
                return;
            }
            // on envoie la valeur vers la page lobby
            window.location.href = "lobby?joueurs=" + nb;
            }
            function generateId() {
                 return Math.random().toString(36).substring(2, 8).toUpperCase();
            }

            let myId = localStorage.getItem("playerId");
            if (!myId) {
                myId = generateId();
                localStorage.setItem("playerId", myId);
            }

            document.getElementById("my-id").textContent = myId;

        </script>
    </main>
</body>
</html>
